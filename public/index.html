<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uses-llm</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("theme");
          const system = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          document.documentElement.dataset.theme =
            saved === "light" || saved === "dark" ? saved : system;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="mx-auto flex min-h-screen w-full max-w-2xl flex-col px-4 py-8 sm:px-6 sm:py-12">
      <header class="mb-8 relative flex flex-col items-center text-center sm:flex-row sm:items-start sm:text-left sm:justify-between gap-4">
        <div class="w-full">
          <p class="display text-[10px] uppercase tracking-widest text-muted">RAG over /uses</p>
          <h1 class="display mt-1 text-2xl font-medium tracking-tight sm:text-3xl">Ask what people use.</h1>
          <p class="mt-2 text-sm text-muted">
            Searching <span id="stat-people" class="font-medium text-text">-</span> people and <span id="stat-chunks" class="font-medium text-text">-</span> indexed snippets.
          </p>
        </div>
        <button id="theme-toggle" type="button" class="theme-toggle absolute right-0 top-0 sm:static" aria-label="Toggle dark mode" aria-pressed="false">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
      </header>

      <section class="w-full">
        <form id="ask-form" class="flex flex-col gap-4">
          <div class="relative">
            <textarea
              id="question"
              name="question"
              rows="4"
              class="field w-full resize-none pb-14"
              placeholder="Example: Which Laravel developers also mention Tailwind and Livewire?"
              required
            ></textarea>
            <div class="absolute bottom-3 right-3">
              <button id="submit-btn" type="submit" class="action-btn flex items-center justify-center p-2 rounded-full">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
              </button>
            </div>
          </div>
          <p id="status" class="text-xs text-muted h-4"></p>
        </form>

        <section id="trace-panel" class="mt-3 hidden">
          <h3 class="display text-[10px] uppercase tracking-widest text-muted">Live Trace</h3>
          <ul id="trace-list" class="mt-2 grid gap-1"></ul>
        </section>
      </section>

      <section id="result" class="mt-8 hidden flex-col gap-6">
        <div>
          <h2 class="display text-sm font-medium text-muted uppercase tracking-widest mb-3">Answer</h2>
          <div id="answer" class="answer text-sm sm:text-base leading-relaxed"></div>
        </div>

        <div class="pt-[20px]">
          <h3 class="display text-sm font-medium text-muted uppercase tracking-widest mb-3">Citations</h3>
          <ul id="citations" class="grid gap-2"></ul>
        </div>
      </section>

      <footer class="mt-auto pt-8 text-xs text-muted text-center sm:text-left">
        Source data from <a href="https://uses.tech" target="_blank" rel="noreferrer" class="hover:text-text transition-colors">uses.tech</a>
      </footer>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
